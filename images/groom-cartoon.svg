<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <defs>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  <!-- Body/Shirt -->
  <rect x="60" y="170" width="80" height="70" rx="10" fill="url(#shirtGrad)"/>
  <!-- Tie -->
  <rect x="95" y="170" width="10" height="40" fill="#d4af37"/>
  <polygon points="100,210 93,218 107,218" fill="#d4af37"/>
  <!-- Head -->
  <ellipse cx="100" cy="130" rx="35" ry="40" fill="#ffe4c4"/>
  <!-- Hair -->
  <ellipse cx="100" cy="100" rx="32" ry="20" fill="#1a1a1a"/>
  <!-- Peci/Cap -->
  <ellipse cx="100" cy="85" rx="35" ry="18" fill="#1a4d2e"/>
  <ellipse cx="100" cy="92" rx="30" ry="12" fill="#1a4d2e" stroke="#d4af37" stroke-width="2"/>
  <!-- Face -->
  <ellipse cx="100" cy="125" rx="28" ry="30" fill="#ffe4c4"/>
  <!-- Eyes -->
  <ellipse cx="90" cy="120" rx="6" ry="8" fill="#2c1810"/>
  <ellipse cx="110" cy="120" rx="6" ry="8" fill="#2c1810"/>
  <circle cx="92" cy="118" r="2" fill="white"/>
  <circle cx="112" cy="118" r="2" fill="white"/>
  <!-- Blush -->
  <ellipse cx="85" cy="130" rx="8" ry="4" fill="#ffb6c1" opacity="0.6"/>
  <ellipse cx="115" cy="130" rx="8" ry="4" fill="#ffb6c1" opacity="0.6"/>
  <!-- Smile -->
  <path d="M 93 140 Q 100 148 107 140" stroke="#d4a5a5" stroke-width="2" fill="none"/>
  <!-- Name -->
  <text x="100" y="245" text-anchor="middle" font-family="Arial" font-size="14" fill="#1a4d2e" font-weight="bold">Arif</text>
</svg>