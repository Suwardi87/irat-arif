<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premium 3D Digital Invitation - Luxury Wedding Invitation" />

    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <title>Undangan Digital Premium</title>

  <body class="bg-dark-950 text-white antialiased overflow-x-hidden">
    <div id="app" class="min-h-screen"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>

  <style>
    /* Mobile-safe padding for notched devices */
    @supports (padding: env(safe-area-inset-bottom)) {
      body {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* Prevent text size adjustment on mobile */
    html {
      -webkit-text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }

    /* Better touch targets */
    button, a {
      min-height: 44px;
      min-width: 44px;
    }

    @media (pointer: fine) {
      button, a {
        min-height: auto;
        min-width: auto;
      }
    }
  </style>
</html>
