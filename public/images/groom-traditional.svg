<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <defs>
    <linearGradient id="bgGradG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff5f0"/>
      <stop offset="100%" stop-color="#ffe8e0"/>
    </linearGradient>
    <filter id="shadowG" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="400" rx="20" fill="url(#bgGradG)"/>

  <!-- Character Group -->
  <g filter="url(#shadowG)">
    <!-- Shadow base -->
    <ellipse cx="100" cy="375" rx="50" ry="8" fill="#d4c4b4" opacity="0.5"/>

    <!-- Legs/Bottom -->
    <rect x="60" y="280" width="35" height="85" fill="#c41e3a" rx="5"/>
    <rect x="105" y="280" width="35" height="85" fill="#c41e3a" rx="5"/>

    <!-- Gold belt/sash -->
    <rect x="55" y="275" width="90" height="15" fill="#d4af37" rx="3"/>
    <rect x="55" y="278" width="90" height="3" fill="#f0d890"/>

    <!-- Shoes -->
    <ellipse cx="77" cy="370" rx="18" ry="7" fill="#1a1a1a"/>
    <ellipse cx="122" cy="370" rx="18" ry="7" fill="#1a1a1a"/>

    <!-- Body - Red traditional outfit (Baju Kurueng) -->
    <path d="M50 130 Q35 190 45 280 L155 280 Q165 190 150 130 Z" fill="#c41e3a"/>

    <!-- Gold embroidery patterns -->
    <path d="M55 140 Q100 160 145 140" stroke="#d4af37" stroke-width="2" fill="none"/>
    <path d="M55 160 Q100 180 145 160" stroke="#d4af37" stroke-width="2" fill="none"/>
    <path d="M55 180 Q100 200 145 180" stroke="#d4af37" stroke-width="2" fill="none"/>
    <path d="M55 200 Q100 220 145 200" stroke="#d4af37" stroke-width="2" fill="none"/>
    <path d="M55 220 Q100 240 145 220" stroke="#d4af37" stroke-width="2" fill="none"/>

    <!-- Center gold trim -->
    <path d="M95 130 L100 275 L105 130 Z" fill="#d4af37"/>

    <!-- Gold buttons -->
    <circle cx="100" cy="150" r="4" fill="#f0d890"/>
    <circle cx="100" cy="175" r="4" fill="#f0d890"/>
    <circle cx="100" cy="200" r="4" fill="#f0d890"/>
    <circle cx="100" cy="225" r="4" fill="#f0d890"/>
    <circle cx="100" cy="250" r="4" fill="#f0d890"/>

    <!-- Collar gold trim -->
    <path d="M70 130 Q100 145 130 130" stroke="#d4af37" stroke-width="3" fill="none"/>

    <!-- Left sleeve -->
    <path d="M50 135 Q25 170 20 210 Q22 220 30 215" fill="#c41e3a"/>
    <path d="M25 170 Q20 190 22 205" stroke="#d4af37" stroke-width="2" fill="none"/>

    <!-- Right sleeve -->
    <path d="M150 135 Q175 170 180 210 Q178 220 170 215" fill="#c41e3a"/>
    <path d="M175 170 Q180 190 178 205" stroke="#d4af37" stroke-width="2" fill="none"/>

    <!-- Hands -->
    <circle cx="25" cy="218" r="14" fill="#f5d5c5"/>
    <circle cx="175" cy="218" r="14" fill="#f5d5c5"/>

    <!-- Neck -->
    <rect x="82" y="100" width="36" height="35" fill="#f5d5c5"/>

    <!-- Head -->
    <ellipse cx="100" cy="70" rx="35" ry="42" fill="#f5d5c5"/>

    <!-- Hair -->
    <ellipse cx="100" cy="48" rx="36" ry="25" fill="#2a2a2a"/>

    <!-- Datura/Red Traditional Hat (Datuak Hat) -->
    <ellipse cx="100" cy="35" rx="42" ry="20" fill="#c41e3a"/>
    <rect x="58" y="20" width="84" height="18" fill="#c41e3a" rx="8"/>

    <!-- Gold embroidery on hat -->
    <path d="M65 28 Q100 35 135 28" stroke="#d4af37" stroke-width="2" fill="none"/>
    <circle cx="100" cy="22" r="5" fill="#d4af37"/>
    <circle cx="80" cy="25" r="3" fill="#f0d890"/>
    <circle cx="120" cy="25" r="3" fill="#f0d890"/>

    <!-- Hat side folds -->
    <path d="M60 30 Q62 38 60 45" stroke="#a01830" stroke-width="1" fill="none"/>
    <path d="M140 30 Q138 38 140 45" stroke="#a01830" stroke-width="1" fill="none"/>

    <!-- Ears -->
    <ellipse cx="65" cy="70" rx="5" ry="10" fill="#f5d5c5"/>
    <ellipse cx="135" cy="70" rx="5" ry="10" fill="#f5d5c5"/>
  </g>
</svg>
