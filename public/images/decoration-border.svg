<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="800" height="100">
  <defs>
    <linearGradient id="borderGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#f0d890"/>
      <stop offset="100%" style="stop-color:#d4af37"/>
    </linearGradient>
  </defs>

  <!-- Main decorative border -->
  <rect x="0" y="45" width="800" height="10" fill="url(#borderGold)" rx="5"/>

  <!-- Top decorative dots -->
  <circle cx="50" cy="40" r="3" fill="#d4af37"/>
  <circle cx="150" cy="40" r="3" fill="#d4af37"/>
  <circle cx="250" cy="40" r="3" fill="#d4af37"/>
  <circle cx="350" cy="40" r="3" fill="#d4af37"/>
  <circle cx="450" cy="40" r="3" fill="#d4af37"/>
  <circle cx="550" cy="40" r="3" fill="#d4af37"/>
  <circle cx="650" cy="40" r="3" fill="#d4af37"/>
  <circle cx="750" cy="40" r="3" fill="#d4af37"/>

  <!-- Bottom decorative dots -->
  <circle cx="50" cy="60" r="3" fill="#d4af37"/>
  <circle cx="150" cy="60" r="3" fill="#d4af37"/>
  <circle cx="250" cy="60" r="3" fill="#d4af37"/>
  <circle cx="350" cy="60" r="3" fill="#d4af37"/>
  <circle cx="450" cy="60" r="3" fill="#d4af37"/>
  <circle cx="550" cy="60" r="3" fill="#d4af37"/>
  <circle cx="650" cy="60" r="3" fill="#d4af37"/>
  <circle cx="750" cy="60" r="3" fill="#d4af37"/>

  <!-- Corner ornaments -->
  <g fill="#d4af37">
    <!-- Left corner -->
    <path d="M10 30 L10 50 L30 50 Z"/>
    <circle cx="10" cy="30" r="4"/>
    <circle cx="30" cy="50" r="4"/>

    <!-- Right corner -->
    <path d="M790 30 L790 50 L770 50 Z"/>
    <circle cx="790" cy="30" r="4"/>
    <circle cx="770" cy="50" r="4"/>
  </g>

  <!-- Center ornament -->
  <g transform="translate(400, 50)">
    <circle cx="0" cy="0" r="8" fill="#d4af37"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#d4af37" stroke-width="1"/>
    <path d="M-20 0 L-12 0 M12 0 L20 0 M0 -20 L0 -12 M0 12 L0 20" stroke="#d4af37" stroke-width="1"/>
  </g>
</svg>
