<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mosqueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d2e"/>
      <stop offset="100%" style="stop-color:#0c2616"/>
    </linearGradient>
    <linearGradient id="domeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8952d"/>
    </linearGradient>
  </defs>

  <!-- Main building -->
  <rect x="20" y="50" width="60" height="40" fill="url(#mosqueGrad)"/>

  <!-- Door -->
  <path d="M35 90 L35 65 Q50 55 65 65 L65 90 Z" fill="#0a1a0f"/>

  <!-- Windows -->
  <rect x="25" y="58" width="8" height="12" rx="4" fill="#d4af37"/>
  <rect x="67" y="58" width="8" height="12" rx="4" fill="#d4af37"/>

  <!-- Main dome -->
  <ellipse cx="50" cy="50" rx="30" ry="20" fill="url(#domeGrad)"/>

  <!-- Dome finial -->
  <rect x="48" y="28" width="4" height="8" fill="#d4af37"/>
  <circle cx="50" cy="26" r="4" fill="#d4af37"/>

  <!-- Left minaret -->
  <rect x="12" y="40" width="8" height="50" fill="url(#mosqueGrad)"/>
  <polygon points="16,40 10,25 22,25" fill="url(#mosqueGrad)"/>
  <circle cx="16" cy="23" r="3" fill="#d4af37"/>

  <!-- Right minaret -->
  <rect x="80" y="40" width="8" height="50" fill="url(#mosqueGrad)"/>
  <polygon points="84,40 78,25 90,25" fill="url(#mosqueGrad)"/>
  <circle cx="84" cy="23" r="3" fill="#d4af37"/>

  <!-- Crescent symbols -->
  <path d="M50 12 Q53 15 50 18 Q47 15 50 12" fill="#d4af37"/>
  <circle cx="50" cy="15" r="6" fill="none" stroke="#d4af37" stroke-width="1"/>
</svg>
