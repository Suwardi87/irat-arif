<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <defs>
    <linearGradient id="bgGradB2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff5f0"/>
      <stop offset="100%" stop-color="#ffe8e0"/>
    </linearGradient>
    <filter id="shadowB2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="400" rx="20" fill="url(#bgGradB2)"/>

  <!-- Character Group -->
  <g filter="url(#shadowB2)">
    <!-- Shadow base -->
    <ellipse cx="100" cy="375" rx="55" ry="8" fill="#d4c4b4" opacity="0.5"/>

    <!-- Dress bottom - flowing -->
    <path d="M30 270 Q15 320 35 385 L165 385 Q185 320 170 270 Z" fill="#c4a060"/>

    <!-- Dress folds -->
    <path d="M45 275 Q35 320 45 380" stroke="#b09050" stroke-width="1.5" fill="none"/>
    <path d="M70 273 Q65 320 72 380" stroke="#b09050" stroke-width="1.5" fill="none"/>
    <path d="M130 273 Q135 320 128 380" stroke="#b09050" stroke-width="1.5" fill="none"/>
    <path d="M155 275 Q165 320 155 380" stroke="#b09050" stroke-width="1.5" fill="none"/>

    <!-- Body - Traditional Baju Kurung/Minang Dress -->
    <path d="M50 130 Q40 190 45 275 L155 275 Q160 190 150 130 Z" fill="#c4a060"/>

    <!-- Gold embroidery on dress -->
    <path d="M55 145 Q100 165 145 145" stroke="#d4af37" stroke-width="2" fill="none"/>
    <path d="M55 170 Q100 190 145 170" stroke="#d4af37" stroke-width="2" fill="none"/>
    <path d="M55 195 Q100 215 145 195" stroke="#d4af37" stroke-width="2" fill="none"/>
    <path d="M55 220 Q100 240 145 220" stroke="#d4af37" stroke-width="2" fill="none"/>

    <!-- Center gold trim -->
    <path d="M95 130 L100 270 L105 130 Z" fill="#d4af37"/>

    <!-- Gold decorative buttons -->
    <circle cx="100" cy="155" r="4" fill="#f0d890"/>
    <circle cx="100" cy="180" r="4" fill="#f0d890"/>
    <circle cx="100" cy="205" r="4" fill="#f0d890"/>
    <circle cx="100" cy="230" r="4" fill="#f0d890"/>
    <circle cx="100" cy="255" r="4" fill="#f0d890"/>

    <!-- Collar with gold trim -->
    <path d="M70 130 Q100 150 130 130" stroke="#d4af37" stroke-width="3" fill="none"/>

    <!-- Gold belt/sash -->
    <rect x="50" y="268" width="100" height="12" fill="#d4af37" rx="3"/>
    <rect x="50" y="271" width="100" height="2" fill="#f0d890"/>

    <!-- Left sleeve -->
    <path d="M50 135 Q25 165 20 205 Q22 218 32 212" fill="#c4a060"/>
    <path d="M25 165 Q20 185 22 200" stroke="#d4af37" stroke-width="2" fill="none"/>

    <!-- Right sleeve -->
    <path d="M150 135 Q175 165 180 205 Q178 218 168 212" fill="#c4a060"/>
    <path d="M175 165 Q180 185 178 200" stroke="#d4af37" stroke-width="2" fill="none"/>

    <!-- Hands -->
    <circle cx="27" cy="215" r="13" fill="#f5d5c5"/>
    <circle cx="173" cy="215" r="13" fill="#f5d5c5"/>

    <!-- Long hair flowing -->
    <path d="M55 80 Q45 120 50 160" stroke="#2a2a2a" stroke-width="25" fill="none" opacity="0.8"/>
    <path d="M145 80 Q155 120 150 160" stroke="#2a2a2a" stroke-width="25" fill="none" opacity="0.8"/>

    <!-- Neck -->
    <rect x="80" y="95" width="40" height="40" fill="#f5d5c5"/>

    <!-- Head -->
    <ellipse cx="100" cy="65" rx="38" ry="45" fill="#f5d5c5"/>

    <!-- Sumping / Horned Headpiece (Tanduk Koto Gadang) -->
    <!-- Main base -->
    <ellipse cx="100" cy="25" rx="50" ry="18" fill="#d4af37"/>

    <!-- Left horn -->
    <path d="M55 20 Q30 5 20 -15 Q25 -5 40 10 Q50 18 55 20" fill="#d4af37"/>
    <path d="M52 18 Q28 5 20 -12" stroke="#f0d890" stroke-width="2" fill="none"/>

    <!-- Right horn -->
    <path d="M145 20 Q170 5 180 -15 Q175 -5 160 10 Q150 18 145 20" fill="#d4af37"/>
    <path d="M148 18 Q172 5 180 -12" stroke="#f0d890" stroke-width="2" fill="none"/>

    <!-- Center ornament -->
    <circle cx="100" cy="15" r="8" fill="#f0d890"/>
    <circle cx="100" cy="15" r="5" fill="#d4af37"/>
    <circle cx="100" cy="15" r="2" fill="#f0d890"/>

    <!-- Side ornaments on headpiece -->
    <circle cx="70" cy="20" r="4" fill="#f0d890"/>
    <circle cx="130" cy="20" r="4" fill="#f0d890"/>

    <!-- Gold decorative flowers on headpiece -->
    <g fill="#f0d890">
      <circle cx="60" cy="22" r="2"/>
      <circle cx="140" cy="22" r="2"/>
      <circle cx="80" cy="18" r="2"/>
      <circle cx="120" cy="18" r="2"/>
    </g>

    <!-- Ears -->
    <ellipse cx="62" cy="65" rx="4" ry="9" fill="#f5d5c5"/>
    <ellipse cx="138" cy="65" rx="4" ry="9" fill="#f5d5c5"/>

    <!-- Earrings -->
    <circle cx="62" cy="78" r="4" fill="#d4af37"/>
    <circle cx="138" cy="78" r="4" fill="#d4af37"/>
  </g>
</svg>
