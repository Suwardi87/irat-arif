<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldDecor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#c9a962"/>
      <stop offset="100%" style="stop-color:#b8952d"/>
    </linearGradient>
    <filter id="glowDecor">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Floral corner decoration -->
  <g filter="url(#glowDecor)">
    <!-- Main stem -->
    <path d="M0 100 Q30 80 50 60 Q70 40 100 30" stroke="url(#goldDecor)" stroke-width="2" fill="none"/>

    <!-- Leaves -->
    <ellipse cx="25" cy="85" rx="15" ry="8" fill="url(#goldDecor)" opacity="0.7" transform="rotate(-30 25 85)"/>
    <ellipse cx="45" cy="65" rx="12" ry="6" fill="url(#goldDecor)" opacity="0.7" transform="rotate(15 45 65)"/>
    <ellipse cx="70" cy="45" rx="10" ry="5" fill="url(#goldDecor)" opacity="0.7" transform="rotate(-10 70 45)"/>

    <!-- Flowers -->
    <circle cx="20" cy="95" r="6" fill="#d4af37"/>
    <circle cx="40" cy="75" r="5" fill="#d4af37"/>
    <circle cx="65" cy="55" r="4" fill="#d4af37"/>
    <circle cx="90" cy="40" r="6" fill="#d4af37"/>

    <!-- Flower centers -->
    <circle cx="20" cy="95" r="2" fill="#c9a962"/>
    <circle cx="40" cy="75" r="1.5" fill="#c9a962"/>
    <circle cx="65" cy="55" r="1.5" fill="#c9a962"/>
    <circle cx="90" cy="40" r="2" fill="#c9a962"/>
  </g>
</svg>
